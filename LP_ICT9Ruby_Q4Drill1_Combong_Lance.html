<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Drill 1</title>

    <style>
         body {
            font-family: Arial;
            text-align: center;
            margin-top: 80px;
            background-color: skyblue;

         }

         .container{
            background-color: white;
            padding: 20px;
            width: 300px;
            margin: auto;
            border: 20px solid white;
            border-radius: 20px;
            border: 2px solid black;
         }

         input{
            padding: 6px;
            width: 80%;
            margin-bottom: 10px;
         }

         button{
            padding: 8px 15px;
            background-color: rgb(0, 0, 255);
            color: white;
            border-radius: 8px;
            cursor: pointer;
         }

         output{
            margin-top: 15px;
            text-align: left;
         }
    </style>

</head>
<body>

    <div class="container">
        <h2>Electricity Consumption Classifier</h2>

        <input type="number" id="usage" placeholder="Enter/Input KWh (Kilowatt per Hour)">
        <br>

        <button onclick="evaluateScore()"> Electricity Consumption Classifier</button>

        <div class="output">
            <p id="Category"> </p>
            <p id="Description"> </p>

        </div>

    </div>

<script>
    function evaluateScore(){
        var usage = document.getElementById("usage").value;
        if(usage=== ""){
            alert("Enter a number.");
            return;
        }

         

        usage = Number(usage);

        if(usage<0){
            alert("Error: Negative Numbers Detected. Note: Please put in a positive number!");
            return;
        }

        var status = "";
        var Category = "";

       
        if(usage<=100){
            Category="Very Low Electricity Consumption"
        }else if(usage<=200){
            Category="Low Electricity Consumption"
        }else if(usage<=300){
            Category="Medium/Average Electricity Consumption"
        }else if(usage<=500){
            Category="High Electricity Consumption"
        }else if(usage>=500){
            Category="Severe Electricity Consumption"
        }
       
       
        var remark = "";
        switch(Category){
            case "Very Low Electricity Consumption":
            remark= "Discounted Electricity Usage Rate";
            break;

            case "Low Electricity Consumption":
            remark= "Low Electricity Usage Rate";
            break;

            case "Medium/Average Electricity Consumption":
            remark= "Normal Electricity Usage Rate";
            break;

            case "High Electricity Consumption":
            remark= "High Electricity Usage Rate";
            break;

            case "Severe Electricity Consumption":
            remark= "Very High Electricity Usage Rate";
            break;
           
        

        }

        document.getElementById("Category").innerHTML = Category;
        document.getElementById("Description").innerHTML = "Description: " + remark;
       


    }
   

</script>
   
</body>
</html>
